
# https://argo-cd.readthedocs.io/en/stable/core_concepts/

name: test

labels:
  - simple

checks:

  - question: |
      What Argo CD concept does this describe: When this is triggered, the latest resource state in Git is compared with the live state. It figures out what is different (but don't necessarily act on it just yet)
      Provide ONLY the answer. 
      The answer is 1 word.
    answers:
      - Refresh

  - question: |
      What Argo CD concept does this describe: The process of making an application move to its target state. E.g. by applying changes to a Kubernetes cluster.
      Provide ONLY the answer. 
      The answer is 1 word.
    answers:
      - Sync

  - question: | 
      "Unknown", "Synced", and "OutOfSync" are an example of what Argo CD concept? 
      Provide ONLY the answer. 
      The answer is 2 words.
    answers:
      - Sync status

  - question: | 
        "Unknown", "Progressing", "Healthy", "Suspended", "Degraded", and "Missing", are an example of what Argo CD concept?
        Provide ONLY the answer. 
        The answer is 2 words.
    answers:
      - Application health
      - Health status

